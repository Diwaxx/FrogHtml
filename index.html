<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>С 8 марта! Волшебная лягушка</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            padding: 10px;
        }

        body.green-bg {
            background: linear-gradient(135deg, #2a5a3a 0%, #1e7b4b 100%);
        }

        .floating-flower {
            position: fixed;
            pointer-events: none;
            font-size: 1.8rem;
            opacity: 0.2;
            z-index: 0;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px 50px 30px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), 0 0 0 2px rgba(255, 255, 255, 0.8);
            padding: 25px 15px 35px;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: cardAppear 0.8s ease-out;
            border: 2px solid white;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            color: #c44569;
            font-size: clamp(2rem, 8vw, 3.2rem);
            text-shadow: 2px 2px 0 #ffeaa7, 4px 4px 0 rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.5s ease;
            line-height: 1.2;
        }

        body.green-bg h1 {
            color: #f8e9a1;
            text-shadow: 2px 2px 0 #2d5a27, 4px 4px 0 #1a3a16;
        }

        .subtitle {
            color: #c44569;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            margin-bottom: 20px;
            font-style: italic;
            background: rgba(255, 232, 214, 0.9);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            border: 2px solid #ffb8b8;
            box-shadow: 0 4px 0 #e89a9a;
            transition: all 0.5s ease;
            font-weight: 600;
        }

        body.green-bg .subtitle {
            background: #e0f0d0;
            color: #1e5a2e;
            border-color: #7cb27c;
            box-shadow: 0 4px 0 #4f784f;
        }

        /* Контейнер для сюрприза */
        .surprise-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* КОРОБКА - ИСПРАВЛЕННАЯ ВЕРСИЯ */
        .gift-box {
            width: 240px;
            height: 220px;
            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.3));
            z-index: 20;
        }

        .gift-box:hover {
            transform: translate(-50%, -50%) scale(1.03);
        }

        .gift-box:active {
            transform: translate(-50%, -50%) scale(0.97);
        }

        .gift-box.hide {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0) rotate(180deg);
            pointer-events: none;
        }

        /* Крышка коробки (верхняя часть) */
        .lid {
            width: 220px;
            height: 45px;
            background: linear-gradient(145deg, #ffb3c6, #ff8cae);
            border-radius: 40px 40px 20px 20px;
            margin: 0 auto;
            border: 5px solid #ff4d7a;
            border-bottom: 2px solid #ff4d7a;
            position: relative;
            z-index: 30;
            box-shadow: inset 0 -8px 0 #ff2e62, 0 10px 15px rgba(0, 0, 0, 0.2);
        }

        /* Основа коробки (нижняя часть) */
        .box-base {
            width: 240px;
            height: 170px;
            background: linear-gradient(145deg, #ffc2d1, #ff9ebc);
            border-radius: 30px 30px 25px 25px;
            border: 6px solid #ff4d7a;
            border-top: 3px solid #ff4d7a;
            margin-top: -8px;
            position: relative;
            z-index: 20;
            box-shadow: inset 0 -12px 0 #ff6b98, inset 0 12px 15px #ffe4f0, 0 15px 20px rgba(0, 0, 0, 0.2);
        }

        /* Основная лента (вертикальная) */
        .ribbon-main {
            width: 45px;
            height: 120px;
            background: linear-gradient(145deg, #fce38a, #ffd166);
            border-radius: 40px;
            border: 5px solid #ffb347;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            box-shadow: 0 8px 0 #e68a2e;
        }

        /* Бант левая часть */
        .ribbon-bow-left {
            width: 50px;
            height: 40px;
            background: linear-gradient(145deg, #fce38a, #ffd166);
            border-radius: 70% 30% 50% 50%;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-80%) rotate(-25deg);
            border: 5px solid #ffb347;
            box-shadow: 0 6px 0 #e68a2e;
            z-index: 26;
        }

        /* Бант правая часть */
        .ribbon-bow-right {
            width: 50px;
            height: 40px;
            background: linear-gradient(145deg, #fce38a, #ffd166);
            border-radius: 30% 70% 50% 50%;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(30%) rotate(25deg);
            border: 5px solid #ffb347;
            box-shadow: 0 6px 0 #e68a2e;
            z-index: 26;
        }

        /* Узел банта */
        .ribbon-knot {
            width: 30px;
            height: 30px;
            background: linear-gradient(145deg, #fce38a, #ffd166);
            border-radius: 30px;
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid #ffb347;
            box-shadow: 0 5px 0 #e68a2e;
            z-index: 27;
        }

        /* Украшения на коробке */
        .heart-deco {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.7;
            animation: sparkle 1.5s infinite;
            z-index: 21;
        }

        .heart-deco-1 { top: 20px; left: 25px; }
        .heart-deco-2 { top: 20px; right: 25px; }
        .heart-deco-3 { bottom: 25px; left: 35px; }
        .heart-deco-4 { bottom: 25px; right: 35px; }

        @keyframes sparkle {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ЛЯГУШКА */
        .frog {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
            background: #b8e0b8;
            border-radius: 100px 100px 50px 50px;
            padding: 15px 15px 15px;
            border: 5px solid #58a358;
            box-shadow: inset 0 -8px 0 #4a934a, 0 20px 25px rgba(0, 0, 0, 0.3);
            width: min(280px, 85vw);
            z-index: 40;
            pointer-events: none;
            animation: frogGlow 3s infinite;
        }

        @keyframes frogGlow {
            0%, 100% { 
                box-shadow: inset 0 -8px 0 #4a934a, 0 20px 25px rgba(0, 0, 0, 0.3);
                filter: brightness(1);
            }
            50% { 
                box-shadow: inset 0 -8px 0 #4a934a, 0 25px 30px rgba(74, 222, 128, 0.4);
                filter: brightness(1.05);
            }
        }

        .frog.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
            animation: frogEntrance 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), frogGlow 3s infinite;
        }

        @keyframes frogEntrance {
            0% { transform: translate(-50%, -30%) scale(0) rotate(-10deg); }
            70% { transform: translate(-50%, -50%) scale(1.05) rotate(2deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0); }
        }

        .frog-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .crown {
            font-size: clamp(2rem, 8vw, 2.5rem);
            line-height: 1;
            margin-top: -5px;
            animation: crownWobble 3s infinite ease-in-out;
        }

        @keyframes crownWobble {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg) scale(1.05); }
        }

        .frog-face {
            position: relative;
            width: min(160px, 60vw);
            height: min(100px, 38vw);
            background: #a5d6a5;
            border-radius: 60% 60% 50% 50%;
            box-shadow: 0 12px 0 #4b6e4b, inset 0 -6px 0 #558855;
            border: 4px solid #376337;
            margin: 5px 0;
        }

        .eye-left, .eye-right {
            position: absolute;
            width: min(40px, 15vw);
            height: min(45px, 17vw);
            background: #f0fff0;
            border-radius: 50%;
            top: 12px;
            border: 4px solid #376337;
            box-shadow: 0 5px 0 #3b543b;
            overflow: hidden;
            animation: eyeBlink 4s infinite;
        }

        .eye-right {
            animation: eyeBlink 4s infinite 0.5s;
        }

        @keyframes eyeBlink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            48%, 52% { transform: scaleY(0.1); }
        }

        .eye-left { left: 15px; }
        .eye-right { right: 15px; }

        .pupil {
            width: 60%;
            height: 65%;
            background: radial-gradient(circle at 30% 30%, #2d4b2d, #163016);
            border-radius: 50%;
            position: absolute;
            top: 15%;
            left: 20%;
            box-shadow: 0 0 0 3px #a0c7a0;
            transition: transform 0.1s linear;
            animation: pupilMove 5s infinite;
        }

        @keyframes pupilMove {
            0%, 20%, 40%, 60%, 80%, 100% { transform: translate(0, 0); }
            10% { transform: translate(2px, 1px); }
            30% { transform: translate(-2px, -1px); }
            50% { transform: translate(1px, -2px); }
            70% { transform: translate(-1px, 2px); }
            90% { transform: translate(2px, -1px); }
        }

        .mouth {
            width: 55%;
            height: 20%;
            background: #ffb6c1;
            border-radius: 0 0 30px 30px;
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #ad4d6b;
            box-shadow: inset 0 -3px 0 #d46b8a;
            animation: mouthWiggle 3s infinite;
        }

        @keyframes mouthWiggle {
            0%, 100% { width: 55%; }
            50% { width: 60%; }
        }

        .mouth-smile {
            width: 70%;
            height: 25%;
            background: #ff4d6d;
            border-radius: 20px;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
        }

        .frog-hands {
            display: flex;
            gap: min(40px, 15vw);
            margin: 5px 0;
        }

        .hand {
            width: min(30px, 12vw);
            height: min(35px, 14vw);
            background: #7cb27c;
            border-radius: 50% 50% 40% 40%;
            border: 4px solid #376337;
            transform: rotate(15deg);
            box-shadow: 0 5px 0 #4f784f;
            animation: handWave 2s infinite;
        }

        .hand:last-child {
            transform: rotate(-15deg);
            animation: handWave 2s infinite reverse;
        }

        @keyframes handWave {
            0%, 100% { transform: rotate(15deg); }
            50% { transform: rotate(25deg); }
        }

        .frog-congrats {
            background: #fff4c9;
            padding: 10px 20px;
            border-radius: 50px 50px 50px 15px;
            font-size: clamp(1.4rem, 6vw, 1.9rem);
            font-weight: bold;
            color: #1f4f1f;
            border: 4px solid #faaa7c;
            box-shadow: 0 6px 0 #d67a4a, 0 8px 12px rgba(0, 0, 0, 0.15);
            margin: 10px 0 5px;
            text-shadow: 1px 1px 0 #ffe0b0;
            line-height: 1.3;
            width: 100%;
            animation: textPop 2s infinite;
        }

        @keyframes textPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .frog-text {
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: #0a3a0a;
            font-weight: 600;
            background: #dcedb9;
            padding: 12px 15px;
            border-radius: 40px;
            border: 3px dashed #2d6a2d;
            line-height: 1.5;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .flower-decoration {
            font-size: clamp(1.8rem, 6vw, 2.2rem);
            margin: 5px 0;
            animation: flowerSpin 4s infinite;
        }

        @keyframes flowerSpin {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            75% { transform: rotate(-3deg); }
        }

        .click-hint {
            background: #ffd93d;
            padding: 12px 20px;
            border-radius: 50px;
            color: #2d1b0e;
            font-weight: bold;
            border: 3px solid #ff8a5c;
            display: inline-block;
            margin-top: 15px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            box-shadow: 0 5px 0 #c46b45, 0 8px 15px rgba(0, 0, 0, 0.15);
            animation: hintPulse 1.5s infinite;
            cursor: pointer;
            user-select: none;
        }

        @keyframes hintPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); background: #ffe570; }
        }

        footer {
            margin-top: 20px;
            color: #c44569;
            font-size: clamp(0.9rem, 3vw, 1rem);
            font-weight: 600;
        }

        body.green-bg footer {
            color: #f8e9a1;
        }

        .confetti {
            position: fixed;
            width: 6px;
            height: 12px;
            background: #ffd700;
            top: -20px;
            z-index: 9999;
            opacity: 0.7;
            animation: confettiFall 2.5s linear forwards;
            pointer-events: none;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .surprise-container {
                width: 260px;
                height: 260px;
            }
            
            .gift-box {
                width: 200px;
                height: 180px;
            }
            
            .box-base {
                width: 200px;
                height: 140px;
            }
            
            .lid {
                width: 180px;
            }
            
            .ribbon-main {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div id="floating-flowers"></div>

    <div class="card">
        <h1>🌸 С 8 Марта! 🌸</h1>

        <div class="surprise-container">
            <!-- КОРОБКА - ТОЛЬКО КРЫШКА И ОСНОВА БЕЗ ТЕКСТА -->
            <div class="gift-box" id="giftBox">
                <!-- Крышка сверху -->
                <div class="lid"></div>
                
                <!-- Основа коробки -->
                <div class="box-base">
                    <!-- Декоративные сердечки -->
                    
                    <!-- Лента и бант -->
                    <div class="ribbon-main"></div>
                    <div class="ribbon-bow-left"></div>
                    <div class="ribbon-bow-right"></div>
                    <div class="ribbon-knot"></div>
                </div>
            </div>

            <!-- Лягушка -->
            <div class="frog" id="frog">
                <div class="frog-content">
                    <div class="crown">👑🐸👑</div>
                    
                    <div class="frog-face" id="frogFace">
                        <div class="eye-left" id="leftEye">
                            <div class="pupil" id="leftPupil"></div>
                        </div>
                        <div class="eye-right" id="rightEye">
                            <div class="pupil" id="rightPupil"></div>
                        </div>
                        <div class="mouth">
                            <div class="mouth-smile"></div>
                        </div>
                    </div>
                    
                    <div class="frog-hands">
                        <div class="hand"></div>
                        <div class="hand"></div>
                    </div>
                    
                    <div class="frog-congrats">
                        Ква-ква!
                    </div>
                    
                    <div class="frog-text">
                        Дорогая Ква, ква-ква-ква!<br>
                        Будь самой ква!
                    </div>
                    
                    <div class="flower-decoration">
                        💐✨🌷✨💐
                    </div>
                </div>
            </div>
        </div>

        <div class="click-hint" id="hint">
            👆 Нажми на коробку!
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const giftBox = document.getElementById('giftBox');
            const frog = document.getElementById('frog');
            const hint = document.getElementById('hint');
            const body = document.body;
            
            const leftPupil = document.getElementById('leftPupil');
            const rightPupil = document.getElementById('rightPupil');
            const frogFace = document.getElementById('frogFace');

            // Создаем цветы
            function createFlowers() {
                const flowers = ['🌸', '🌼', '🌺', '🌷'];
                const container = document.getElementById('floating-flowers');
                for (let i = 0; i < 8; i++) {
                    const flower = document.createElement('div');
                    flower.className = 'floating-flower';
                    flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                    flower.style.left = Math.random() * 100 + '%';
                    flower.style.top = Math.random() * 100 + '%';
                    flower.style.animationDelay = Math.random() * 3 + 's';
                    container.appendChild(flower);
                }
            }
            createFlowers();

            // Синхронизация глаз
            function moveEyesTogether(x, y) {
                if (!leftPupil || !rightPupil) return;
                
                const moveX = Math.min(5, Math.max(-5, x * 3));
                const moveY = Math.min(3, Math.max(-3, y * 2));
                
                leftPupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
                rightPupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }

            if (frogFace) {
                frogFace.addEventListener('mousemove', function(e) {
                    const rect = frogFace.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const x = (e.clientX - centerX) / (rect.width / 2);
                    const y = (e.clientY - centerY) / (rect.height / 2);
                    
                    leftPupil.style.animation = 'none';
                    rightPupil.style.animation = 'none';
                    moveEyesTogether(x, y);
                });

                frogFace.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = frogFace.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const x = (touch.clientX - centerX) / (rect.width / 2);
                    const y = (touch.clientY - centerY) / (rect.height / 2);
                    
                    leftPupil.style.animation = 'none';
                    rightPupil.style.animation = 'none';
                    moveEyesTogether(x, y);
                });

                frogFace.addEventListener('mouseleave', function() {
                    leftPupil.style.transform = 'translate(0, 0)';
                    rightPupil.style.transform = 'translate(0, 0)';
                    leftPupil.style.animation = 'pupilMove 5s infinite';
                    rightPupil.style.animation = 'pupilMove 5s infinite';
                });

                frogFace.addEventListener('touchend', function() {
                    leftPupil.style.transform = 'translate(0, 0)';
                    rightPupil.style.transform = 'translate(0, 0)';
                    leftPupil.style.animation = 'pupilMove 5s infinite';
                    rightPupil.style.animation = 'pupilMove 5s infinite';
                });
            }

            // Конфетти
            function createConfetti() {
                for (let i = 0; i < 30; i++) {
                    setTimeout(() => {
                        const confetti = document.createElement('div');
                        confetti.className = 'confetti';
                        confetti.style.left = Math.random() * 100 + '%';
                        confetti.style.animationDelay = Math.random() * 1.5 + 's';
                        confetti.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
                        document.body.appendChild(confetti);
                        setTimeout(() => confetti.remove(), 2500);
                    }, i * 30);
                }
            }

            giftBox.addEventListener('click', function() {
                giftBox.classList.add('hide');
                frog.classList.add('show');
                body.classList.add('green-bg');
                createConfetti();
                hint.textContent = '🐸 С 8 марта! 🐸';
                hint.style.background = '#b0d9b0';
                hint.style.borderColor = '#4f8a4f';
                hint.style.color = '#1f4f1f';
            });

            giftBox.addEventListener('touchstart', function(e) {
                e.preventDefault();
                giftBox.click();
            });
        });
    </script>
</body>
</html>
