<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>С 8 марта!</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(145deg, #f8bbd0 0%, #f1d6e7 100%);
        font-family: "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        padding: 16px;
        transition: background 0.8s ease;
      }

      body.green-bg {
        background: linear-gradient(145deg, #a8d5ba 0%, #c0e3c0 100%);
      }

      .card {
        max-width: 600px;
        width: 100%;
        background-color: rgba(255, 240, 245, 0.7);
        backdrop-filter: blur(4px);
        border-radius: 60px 60px 40px 40px;
        box-shadow: 0 20px 40px rgba(190, 120, 140, 0.3);
        padding: 30px 20px 40px;
        text-align: center;
        border: 3px solid #ffe9f0;
        transition:
          background-color 0.5s ease,
          border-color 0.5s ease;
      }

      body.green-bg .card {
        background-color: rgba(220, 240, 210, 0.8);
        border-color: #b0d9b0;
      }

      h1 {
        color: #9b4b6b;
        font-size: 2.5rem;
        text-shadow: 2px 2px 0 #ffd9e6;
        margin-bottom: 10px;
        transition:
          color 0.5s ease,
          text-shadow 0.5s ease;
      }

      body.green-bg h1 {
        color: #2d6a4f;
        text-shadow: 2px 2px 0 #a8e6b0;
      }

      .subtitle {
        color: #b85c7e;
        font-size: 1.3rem;
        margin-bottom: 30px;
        font-style: italic;
        border-bottom: 2px dashed #e5a1bb;
        padding-bottom: 12px;
        display: inline-block;
        transition:
          color 0.5s ease,
          border-bottom-color 0.5s ease;
      }

      body.green-bg .subtitle {
        color: #40916c;
        border-bottom-color: #8fc0a9;
      }

      /* Контейнер для коробки и жабы (чтобы они занимали одно место) */
      .surprise-container {
        position: relative;
        width: 260px;
        height: 260px;
        margin: 0 auto 30px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Коробка (кликабельная) */
      .gift-box {
        width: 220px;
        height: 200px;
        cursor: pointer;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
        filter: drop-shadow(0 12px 15px rgba(160, 80, 110, 0.4));
        z-index: 10;
      }

      .gift-box.hide {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1);
        pointer-events: none;
      }

      .gift-box:hover {
        transform: translate(-50%, -50%) scale(1.02);
      }

      .gift-box:active {
        transform: translate(-50%, -50%) scale(0.98);
      }

      /* Крышка коробки */
      .lid {
        width: 200px;
        height: 40px;
        background: #f9a8c8;
        border-radius: 30px 30px 0 0;
        margin: 0 auto;
        border: 4px solid #f47aa4;
        border-bottom: none;
        position: relative;
        z-index: 5;
        box-shadow: inset 0 -5px 0 #f68bb1;
      }

      .lid-deco {
        width: 50px;
        height: 15px;
        background: #ffd9e6;
        border-radius: 20px;
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: 0 2px 0 #f47aa4;
      }

      /* Основа коробки */
      .box-base {
        width: 220px;
        height: 150px;
        background: #fbc4d4;
        border-radius: 30px 30px 25px 25px;
        border: 5px solid #f47aa4;
        border-top: 2px solid #f47aa4;
        margin-top: -10px;
        position: relative;
        z-index: 4;
        box-shadow:
          inset 0 -8px 0 #f9a8c8,
          inset 0 8px 10px #ffeef4;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding-bottom: 15px;
      }

      /* Ленточка */
      .ribbon {
        width: 40px;
        height: 90px;
        background: #feaac7;
        border-radius: 40px;
        border: 4px solid #f26b9c;
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        box-shadow: 0 4px 0 #d94e7e;
      }

      .ribbon-bow {
        width: 60px;
        height: 40px;
        background: #feaac7;
        border-radius: 60% 40% 50% 50%;
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%) rotate(10deg);
        border: 4px solid #f26b9c;
        box-shadow: 0 4px 0 #d94e7e;
        z-index: 11;
      }

      .ribbon-bow::after {
        content: "";
        position: absolute;
        width: 60px;
        height: 40px;
        background: #feaac7;
        border-radius: 40% 60% 50% 50%;
        top: -5px;
        left: -20px;
        border: 4px solid #f26b9c;
        transform: rotate(-20deg);
        box-shadow: 0 4px 0 #d94e7e;
      }

      .sticker {
        background: #fef0b5;
        padding: 8px 12px;
        border-radius: 40px;
        font-size: 1.1rem;
        font-weight: bold;
        color: #a53860;
        border: 3px solid #ff94b6;
        transform: rotate(-8deg);
        box-shadow: 0 4px 0 #e58aa8;
        margin-bottom: 12px;
        z-index: 20;
        position: relative;
      }

      /* Жаба (появляется из коробки) */
      .frog {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
        transition:
          transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.4s ease;
        background: #e3f2e9;
        border-radius: 100px 100px 50px 50px;
        padding: 20px 15px 15px;
        border: 6px solid #b0d9c1;
        box-shadow:
          inset 0 -6px 0 #8bc34a,
          0 15px 20px rgba(100, 130, 90, 0.3);
        background-image:
          radial-gradient(circle at 20px 20px, #c5e0ca 3px, transparent 3px),
          radial-gradient(circle at 60px 40px, #c5e0ca 4px, transparent 4px);
        background-size: 40px 40px;
        width: 280px;
        z-index: 20;
        pointer-events: none;
      }

      .frog.show {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        pointer-events: auto;
      }

      /* Сама жаба (содержимое) */
      .frog-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .frog-face {
        position: relative;
        width: 130px;
        height: 90px;
        background: #7cb27c;
        border-radius: 60% 60% 50% 50%;
        box-shadow:
          0 12px 0 #4b6e4b,
          inset 0 -8px 0 #558855;
        border: 4px solid #376337;
      }

      .eye-left,
      .eye-right {
        position: absolute;
        width: 34px;
        height: 40px;
        background: #e5f2e5;
        border-radius: 50%;
        top: 12px;
        border: 4px solid #376337;
        box-shadow: 0 6px 0 #3b543b;
      }

      .eye-left {
        left: 16px;
      }
      .eye-right {
        right: 16px;
      }

      .pupil {
        width: 18px;
        height: 20px;
        background: #2d4b2d;
        border-radius: 50%;
        position: absolute;
        top: 8px;
        left: 6px;
        box-shadow: 0 0 0 3px #a0c7a0;
        transition: background 0.2s;
      }

      .mouth {
        width: 45px;
        height: 25px;
        background: #995a5a;
        border-radius: 0 0 40px 40px;
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        border: 3px solid #5e3a3a;
        box-shadow: inset 0 -4px 0 #643e3e;
      }

      .mouth-smile {
        width: 30px;
        height: 12px;
        background: #ffb6c1;
        border-radius: 20px 20px 0 0;
        position: absolute;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        border: 2px solid #ad4d6b;
        border-bottom: none;
      }

      .frog-hands {
        display: flex;
        gap: 40px;
        margin-top: -5px;
      }

      .hand {
        width: 28px;
        height: 35px;
        background: #7cb27c;
        border-radius: 40%;
        border: 3px solid #376337;
        transform: rotate(15deg);
        box-shadow: 0 6px 0 #4f784f;
      }

      .hand:last-child {
        transform: rotate(-15deg);
      }

      .frog-congrats {
        background: #fff4c9;
        padding: 12px 20px;
        border-radius: 50px 50px 50px 10px;
        font-size: 1.7rem;
        font-weight: bold;
        color: #2d572d;
        border: 4px solid #faaa7c;
        box-shadow: 0 7px 0 #d67a4a;
        margin: 10px 0 5px;
        display: inline-block;
        transform: rotate(1deg);
      }

      .frog-text {
        font-size: 1.3rem;
        color: #1f4f1f;
        font-weight: 500;
        background: #dcedb9;
        padding: 10px 20px;
        border-radius: 30px;
        border: 2px dashed #6f9e6f;
      }

      .flower {
        font-size: 2rem;
        filter: drop-shadow(2px 4px 4px #b3a1a1);
      }

      .click-hint {
        background: #ffe4f0;
        padding: 8px 18px;
        border-radius: 40px;
        color: #a13e5e;
        font-weight: 600;
        border: 2px solid #ffb6d0;
        display: inline-block;
        margin-top: 15px;
        font-size: 1.1rem;
        transition: all 0.3s;
      }

      body.green-bg .click-hint {
        background: #d9f0d9;
        border-color: #7cb27c;
        color: #2d572d;
      }

      footer {
        margin-top: 20px;
        color: #b45e7e;
        transition: color 0.5s ease;
      }

      body.green-bg footer {
        color: #40916c;
      }
      html,
      body {
        width: 100%;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🌸 С 8 марта! 🌸</h1>

      <!-- Контейнер для анимации -->
      <div class="surprise-container">
        <!-- Коробка -->
        <div class="gift-box" id="giftBox">
          <div class="lid">
            <div class="lid-deco"></div>
          </div>
          <div class="box-base">
            <div class="sticker">🌷 Для тебя 🌷</div>
            <div class="ribbon"></div>
            <div class="ribbon-bow"></div>
          </div>
        </div>

        <!-- Жаба (появится после клика) -->
        <div class="frog" id="frog">
          <div class="frog-content">
            <div class="flower"></div>
            <div class="frog-face">
              <div class="eye-left"><div class="pupil"></div></div>
              <div class="eye-right"><div class="pupil"></div></div>
              <div class="mouth"></div>
              <div class="mouth-smile"></div>
            </div>
            <div class="frog-hands">
              <div class="hand"></div>
              <div class="hand"></div>
            </div>
            <div class="frog-congrats">Ква-красивого дня!</div>
            <div class="frog-text">
              Желаю счастья, здоровья, любви,<br />
              и чтобы все желания исполнялись!
            </div>
            <div class="flower">🐸🌷🐸</div>
          </div>
        </div>
      </div>

      <div class="click-hint" id="hint">👆 Нажми на коробку, там сюрприз!</div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const giftBox = document.getElementById("giftBox");
        const frog = document.getElementById("frog");
        const hint = document.getElementById("hint");
        const body = document.body;

        if (!giftBox || !frog || !hint) return;

        giftBox.addEventListener("click", function () {
          // Прячем коробку
          giftBox.classList.add("hide");

          // Показываем жабу с анимацией
          frog.classList.add("show");

          // Меняем фон на зеленый
          body.classList.add("green-bg");

          // Меняем подсказку
          hint.textContent = "🐸 Ква-поздравление уже здесь! 🐸";

          // Небольшой бонус: зрачки смотрят в стороны (радость)
          setTimeout(() => {
            const pupils = document.querySelectorAll(".pupil");
            pupils.forEach((pupil) => {
              pupil.style.transform = "scale(1.1)";
              pupil.style.background = "#163816";
            });
          }, 300);
        });

        // Эффект при наведении на жабу после появления
        frog.addEventListener("mouseenter", function () {
          if (frog.classList.contains("show")) {
            const pupils = document.querySelectorAll(".pupil");
            pupils.forEach((p) => (p.style.background = "#2b3d1f"));
          }
        });

        frog.addEventListener("mouseleave", function () {
          const pupils = document.querySelectorAll(".pupil");
          pupils.forEach((p) => (p.style.background = "#2d4b2d"));
        });
      });
    </script>
  </body>
</html>
